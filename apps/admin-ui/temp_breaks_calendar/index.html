      // Match Details Modal Functions
      function openMatchDetailsModal(matchData, frameActions = []) {
        const modal = document.getElementById('matchDetailsModal');
        const modalBody = document.getElementById('matchModalBody');

        // Status display
        let statusClass = '';
        let statusText = '';
        if (matchData.active) {
          statusClass = '';
          statusText = 'Live';
        } else if (matchData.ended) {
          statusClass = 'ended';
          statusText = 'Match Ended';
        } else {
          statusClass = 'paused';
          statusText = 'Paused';
        }

        // Action type display config
        function getActionDisplay(actionType) {
          const types = {
            'BREAK':      { label: 'Break',      color: '#f59e0b' },
            'FOUL':       { label: 'Foul',       color: '#ef4444' },
            'FRAME_WON':  { label: 'Frame Won',  color: '#22c55e' },
            'FRAME_END':  { label: 'Frame End',  color: '#22c55e' },
            'FRAME_START':{ label: 'Frame Start', color: '#3b82f6' },
            'MATCH_END':  { label: 'Match End',  color: '#8b5cf6' },
            'SCORE':      { label: 'Score',      color: '#8b5cf6' },
            'POT':        { label: 'Pot',        color: '#10b981' },
            'SAFETY':     { label: 'Safety',     color: '#6366f1' },
            'MISS':       { label: 'Miss',       color: '#f97316' },
            'FREE_BALL':  { label: 'Free Ball',  color: '#06b6d4' },
            'HANDICAP':   { label: 'Handicap',   color: '#a78bfa' },
            'UNDO':       { label: 'Undo',       color: '#64748b' },
            'RETAKE':     { label: 'Retake',     color: '#a855f7' },
            'CONCEDE':    { label: 'Concede',    color: '#64748b' },
            'TIMEOUT':    { label: 'Timeout',    color: '#eab308' },
          };
          return types[actionType.toUpperCase()] || { label: actionType, color: '#94a3b8' };
        }

        // Actions where points go to the acting player (playerIndex is 1-indexed: 1 or 2)
        function isDirectScoreAction(actionType) {
          return ['BREAK', 'SCORE', 'POT', 'HANDICAP'].includes(actionType.toUpperCase());
        }

        // Group frame actions by frame number
        const frameMap = {};
        frameActions.forEach(action => {
          const fn = action.frameNumber || 1;
          if (!frameMap[fn]) frameMap[fn] = [];
          frameMap[fn].push(action);
        });
        const frameNumbers = Object.keys(frameMap).map(Number).sort((a, b) => a - b);

        // Helper: apply a scoring action to totals (playerIndex is 1-indexed)
        // For FOUL: playerIndex = the player who committed the foul, points go to opponent
        // For BREAK/HANDICAP/etc: playerIndex = the scorer, points go to them
        function applyAction(a, totals) {
          const type = a.actionType.toUpperCase();
          if (type === 'FOUL' && a.points > 0) {
            // Foul: playerIndex committed it, opponent receives points
            if (a.playerIndex === 1) { totals.p2 += a.points; return { scored: 2, points: a.points }; }
            else { totals.p1 += a.points; return { scored: 1, points: a.points }; }
          } else if (isDirectScoreAction(type) && a.points > 0) {
            if (a.playerIndex === 1) { totals.p1 += a.points; return { scored: 1, points: a.points }; }
            else { totals.p2 += a.points; return { scored: 2, points: a.points }; }
          }
          return null;
        }

        function reverseScoreEntry(entry, totals) {
          if (entry.scored === 1) totals.p1 -= entry.points;
          else totals.p2 -= entry.points;
        }

        // Build frame breakdown HTML
        let frameBreakdownHTML = '';
        if (frameNumbers.length > 0) {
          frameBreakdownHTML = `
            <div class="frame-breakdown">
              <div class="frame-breakdown-title">Match Breakdown</div>
              ${frameNumbers.map(fn => {
                const actions = frameMap[fn];

                // Calculate final frame scores and stats
                let p1Total = 0, p2Total = 0;
                let p1Breaks = [], p2Breaks = [];
                let p1FoulPts = 0, p2FoulPts = 0;
                let frameWinner = null;
                const scoreStack = [];
                const totals = { p1: 0, p2: 0 };

                actions.forEach(a => {
                  const at = a.actionType.toUpperCase();
                  if (at === 'FRAME_WON' || at === 'FRAME_END') {
                    if (frameWinner === null) frameWinner = totals.p1 >= totals.p2 ? 0 : 1;
                  } else if (at === 'UNDO') {
                    const prev = scoreStack.pop();
                    if (prev) {
                      reverseScoreEntry(prev.entry, totals);
                      if (prev.actionType === 'FOUL') {
                        if (prev.entry.scored === 1) p1FoulPts -= prev.entry.points;
                        else p2FoulPts -= prev.entry.points;
                      }
                      if (prev.actionType === 'BREAK') {
                        if (prev.entry.scored === 1) p1Breaks.pop();
                        else p2Breaks.pop();
                      }
                    }
                  } else {
                    const entry = applyAction(a, totals);
                    if (entry) {
                      scoreStack.push({ entry, actionType: at });
                      if (at === 'FOUL') {
                        if (entry.scored === 1) p1FoulPts += entry.points;
                        else p2FoulPts += entry.points;
                      }
                      if (at === 'BREAK') {
                        if (entry.scored === 1) p1Breaks.push(a.points);
                        else p2Breaks.push(a.points);
                      }
                    }
                  }
                });
                p1Total = totals.p1;
                p2Total = totals.p2;

                const p1HighBreak = p1Breaks.length > 0 ? Math.max(...p1Breaks) : 0;
                const p2HighBreak = p2Breaks.length > 0 ? Math.max(...p2Breaks) : 0;
                const isInProgress = frameWinner === null;

                // Build timeline rows with running scores
                const runTotals = { p1: 0, p2: 0 };
                const runStack = [];
                const timelineRows = actions.map(a => {
                  const display = getActionDisplay(a.actionType);
                  const isP1 = a.playerIndex === 1;
                  const time = new Date(a.timestamp).toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                  const undone = a.wasUndone === true;

                  let p1Changed = false, p2Changed = false;
                  const prevP1 = runTotals.p1, prevP2 = runTotals.p2;

                  if (a.actionType.toUpperCase() === 'UNDO') {
                    const prev = runStack.pop();
                    if (prev) reverseScoreEntry(prev, runTotals);
                  } else {
                    const entry = applyAction(a, runTotals);
                    if (entry) runStack.push(entry);
                  }

                  p1Changed = runTotals.p1 !== prevP1;
                  p2Changed = runTotals.p2 !== prevP2;

                  return `
                    <div class="frame-timeline-row ${isP1 ? 'is-p1' : 'is-p2'}${undone ? ' was-undone' : ''}">
                      <span class="tl-score left ${p1Changed ? 'changed' : ''}">${runTotals.p1}</span>
                      <span class="tl-player left">${isP1 ? matchData.player1Name : ''}</span>
                      <div class="tl-action">
                        <span class="tl-badge" style="background: ${display.color}15; color: ${display.color}; border-color: ${display.color}35;">
                          ${display.label}${a.points > 0 ? ' (' + a.points + ')' : ''}
                        </span>
                        <span class="tl-time">${time}</span>
                      </div>
                      <span class="tl-player right">${!isP1 ? matchData.player2Name : ''}</span>
                      <span class="tl-score right ${p2Changed ? 'changed' : ''}">${runTotals.p2}</span>
                    </div>
                  `;
                }).join('');

                return `
                  <div class="frame-card" data-frame="${fn}">
                    <div class="frame-card-header" onclick="this.parentElement.classList.toggle('expanded')">
                      <div class="frame-header-left">
                        <span class="frame-chevron">&#9654;</span>
                        <span class="frame-header-player ${frameWinner === 0 ? 'winner' : ''}">${matchData.player1Name}</span>
                        <span class="frame-card-number">Frame ${fn}</span>
                      </div>
                      <div class="frame-card-score">
                        <span class="frame-score-p1 ${frameWinner === 0 ? 'winner' : ''}">${p1Total}</span>
                        <span class="frame-card-divider">-</span>
                        <span class="frame-score-p2 ${frameWinner === 1 ? 'winner' : ''}">${p2Total}</span>
                      </div>
                      <div class="frame-header-right">
                        ${isInProgress
                          ? '<span class="frame-in-progress">In Progress</span>'
                          : ''
                        }
                        <span class="frame-header-player ${frameWinner === 1 ? 'winner' : ''}">${matchData.player2Name}</span>
                      </div>
                    </div>
                    <div class="frame-card-body">
                      <div class="frame-stats">
                        <div class="frame-stat-player">
                          <div class="frame-stat-player-name">${matchData.player1Name}</div>
                          <div class="frame-stat-item"><span class="frame-stat-value">${p1Total}</span><span class="frame-stat-label">Points</span></div>
                          <div class="frame-stat-item"><span class="frame-stat-value highlight">${p1HighBreak || '-'}</span><span class="frame-stat-label">High Break</span></div>
                          <div class="frame-stat-item"><span class="frame-stat-value">${p1Breaks.length}</span><span class="frame-stat-label">Breaks</span></div>
                          <div class="frame-stat-item"><span class="frame-stat-value foul">${p1FoulPts}</span><span class="frame-stat-label">Foul Pts</span></div>
                        </div>
                        <div class="frame-stats-divider"></div>
                        <div class="frame-stat-player right">
                          <div class="frame-stat-player-name">${matchData.player2Name}</div>
                          <div class="frame-stat-item"><span class="frame-stat-value">${p2Total}</span><span class="frame-stat-label">Points</span></div>
                          <div class="frame-stat-item"><span class="frame-stat-value highlight">${p2HighBreak || '-'}</span><span class="frame-stat-label">High Break</span></div>
                          <div class="frame-stat-item"><span class="frame-stat-value">${p2Breaks.length}</span><span class="frame-stat-label">Breaks</span></div>
                          <div class="frame-stat-item"><span class="frame-stat-value foul">${p2FoulPts}</span><span class="frame-stat-label">Foul Pts</span></div>
                        </div>
                      </div>
                      <div class="frame-timeline-header">
                        <span class="tl-header-left">${matchData.player1Name}</span>
                        <span class="tl-header-name"></span>
                        <span class="tl-header-center">Action</span>
                        <span class="tl-header-name"></span>
                        <span class="tl-header-right">${matchData.player2Name}</span>
                      </div>
                      <div class="frame-timeline">
                        ${timelineRows}
                      </div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          `;
        }

        // Compute match-level statistics from frame actions
        const matchStats = { p1: { totalPts: 0, fouls: 0, foulPts: 0, visits: 0 }, p2: { totalPts: 0, fouls: 0, foulPts: 0, visits: 0 } };
        const statsStack = [];
        frameActions.forEach(a => {
          const at = a.actionType.toUpperCase();
          if (at === 'UNDO') {
            const prev = statsStack.pop();
            if (prev) {
              prev.target.totalPts -= prev.points;
              if (prev.wasFoul) { prev.committer.fouls--; prev.committer.foulPts -= prev.points; }
              if (prev.wasVisit) { prev.scorer.visits--; }
            }
          } else if (at === 'FOUL' && a.points > 0) {
            const committer = a.playerIndex === 1 ? matchStats.p1 : matchStats.p2;
            const target = a.playerIndex === 1 ? matchStats.p2 : matchStats.p1;
            target.totalPts += a.points;
            committer.fouls++;
            committer.foulPts += a.points;
            statsStack.push({ target, points: a.points, wasFoul: true, committer, wasVisit: false, scorer: null });
          } else if (isDirectScoreAction(at) && a.points > 0) {
            const scorer = a.playerIndex === 1 ? matchStats.p1 : matchStats.p2;
            scorer.totalPts += a.points;
            scorer.visits++;
            statsStack.push({ target: scorer, points: a.points, wasFoul: false, committer: null, wasVisit: true, scorer });
          }
        });
        const p1Avg = matchStats.p1.visits > 0 ? (matchStats.p1.totalPts / matchStats.p1.visits).toFixed(1) : '0';
        const p2Avg = matchStats.p2.visits > 0 ? (matchStats.p2.totalPts / matchStats.p2.visits).toFixed(1) : '0';

        // Determine mode: live (active match) vs finished (ended/historical)
        const isLiveMode = matchData.active === true;

        // Build modal content
        modalBody.innerHTML = `
          <div class="modal-scoreboard">
            <div class="modal-header-row">
              <div class="modal-table-number">Table ${matchData.tableNumber}</div>
              <div class="modal-match-status ${statusClass}">
                <span class="modal-status-dot"></span>
                ${statusText}
              </div>
            </div>

            <div class="modal-players-row">
              <div class="modal-player-left">
                <img src="https://roundrobin.ch/IMAGES/Flags/GIF/128/${matchData.player1IOC}.gif"
                     class="modal-flag" alt="Flag"
                     onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/No_image_available.svg/300px-No_image_available.svg.png'" />
                <span class="modal-player-text">${matchData.player1Name}</span>
              </div>
              <div class="modal-player-right">
                <span class="modal-player-text">${matchData.player2Name}</span>
                <img src="https://roundrobin.ch/IMAGES/Flags/GIF/128/${matchData.player2IOC}.gif"
                     class="modal-flag" alt="Flag"
                     onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/No_image_available.svg/300px-No_image_available.svg.png'" />
              </div>
            </div>

            ${isLiveMode ? `
            <div class="modal-frames-bar">
              <span class="modal-frames-label">Frames</span>
              <div class="modal-frames-numbers">
                <span>${matchData.player1Frames}</span>
                <span>${matchData.bestOf}</span>
                <span>${matchData.player2Frames}</span>
              </div>
            </div>

            <div class="modal-scores-row">
              <span class="modal-score-left">${matchData.player1Score}</span>
              <span class="modal-score-label">Score</span>
              <span class="modal-score-right">${matchData.player2Score}</span>
            </div>

            <div class="modal-breaks-row">
              <span class="modal-break-left">
                ${matchData.player1Breaks && matchData.player1Breaks.length > 0
                  ? matchData.player1Breaks.join(', ')
                  : '0'}
              </span>
              <span class="modal-breaks-label">Breaks</span>
              <span class="modal-break-right">
                ${matchData.player2Breaks && matchData.player2Breaks.length > 0
                  ? matchData.player2Breaks.join(', ')
                  : '0'}
              </span>
            </div>
            ` : `
            <div class="modal-frames-bar finished">
              <span class="modal-frames-count">${matchData.player1Frames}</span>
              <div class="modal-frames-center">
                <span class="modal-frames-label">Frames</span>
                <span class="modal-frames-bestof">Best of ${matchData.bestOf}</span>
              </div>
              <span class="modal-frames-count">${matchData.player2Frames}</span>
            </div>

            <div class="modal-breaks-row">
              <span class="modal-break-left">
                ${matchData.player1Breaks && matchData.player1Breaks.length > 0
                  ? matchData.player1Breaks.join(', ')
                  : '-'}
              </span>
              <span class="modal-breaks-label">Breaks</span>
              <span class="modal-break-right">
                ${matchData.player2Breaks && matchData.player2Breaks.length > 0
                  ? matchData.player2Breaks.join(', ')
                  : '-'}
              </span>
            </div>
            `}
          </div>

          ${!isLiveMode && frameActions.length > 0 ? `
          <div class="match-stats-section">
            <div class="match-stats-title">Match Statistics</div>
            <div class="match-stats-grid">
              <div class="match-stats-header">
                <span class="mst-p1">${matchData.player1Name}</span>
                <span class="mst-label"></span>
                <span class="mst-p2">${matchData.player2Name}</span>
              </div>
              <div class="match-stats-row">
                <span class="mst-val">${matchStats.p1.totalPts}</span>
                <span class="mst-label">Total Points</span>
                <span class="mst-val">${matchStats.p2.totalPts}</span>
              </div>
              <div class="match-stats-row">
                <span class="mst-val">${matchStats.p1.visits}</span>
                <span class="mst-label">Scoring Visits</span>
                <span class="mst-val">${matchStats.p2.visits}</span>
              </div>
              <div class="match-stats-row">
                <span class="mst-val">${p1Avg}</span>
                <span class="mst-label">Avg. Points / Visit</span>
                <span class="mst-val">${p2Avg}</span>
              </div>
              <div class="match-stats-row">
                <span class="mst-val">${matchStats.p1.fouls}</span>
                <span class="mst-label">Fouls</span>
                <span class="mst-val">${matchStats.p2.fouls}</span>
              </div>
              <div class="match-stats-row">
                <span class="mst-val foul">${matchStats.p1.foulPts}</span>
                <span class="mst-label">Foul Pts Given Away</span>
                <span class="mst-val foul">${matchStats.p2.foulPts}</span>
              </div>
            </div>
          </div>
          ` : ''}

          ${frameBreakdownHTML}
        `;

        modal.style.display = 'flex';
      }

      function closeMatchDetailsModal() {
        const modal = document.getElementById('matchDetailsModal');
        modal.style.display = 'none';
      }

      // Highlights Page Controller
      var highlightsPage = null;

      class HighlightsPage {
        constructor() {
          this.currentPeriodType = 'month'; // 'month' or 'year'
          this.availablePeriods = { months: [], years: [] };
          this.currentMonthIndex = 0;
          this.currentYearIndex = 0;
          this.isFlipped = false;
        }

        async init() {
          await this.loadAvailablePeriods();
          this.setupEventListeners();
          await this.loadCurrentPeriod();
        }

        async loadAvailablePeriods() {
          try {
            const response = await fetch(
              'http://localhost:3000/highlights/available-periods'
            );
            const { data } = await response.json();
            this.availablePeriods = data;

            // Start with most recent month
            this.currentMonthIndex = 0;
            this.currentYearIndex = 0;
          } catch (error) {
            console.error('Error loading available periods:', error);
          }
        }

        setupEventListeners() {
          // Period type toggle
          document.querySelectorAll('.period-type-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              document.querySelectorAll('.period-type-btn').forEach(b =>
                b.classList.remove('active')
              );
              e.target.classList.add('active');
              this.currentPeriodType = e.target.dataset.type;
              this.loadCurrentPeriod();
            });
          });

          // Navigation
          document.getElementById('prev-period').addEventListener('click', () => {
            this.navigatePeriod(-1);
          });

          document.getElementById('next-period').addEventListener('click', () => {
            this.navigatePeriod(1);
          });
        }

        navigatePeriod(direction) {
          if (this.currentPeriodType === 'month') {
            this.currentMonthIndex += direction;
            if (this.currentMonthIndex < 0) this.currentMonthIndex = 0;
            if (this.currentMonthIndex >= this.availablePeriods.months.length) {
              this.currentMonthIndex = this.availablePeriods.months.length - 1;
            }
          } else {
            this.currentYearIndex += direction;
            if (this.currentYearIndex < 0) this.currentYearIndex = 0;
            if (this.currentYearIndex >= this.availablePeriods.years.length) {
              this.currentYearIndex = this.availablePeriods.years.length - 1;
            }
          }

          this.loadCurrentPeriod();
        }

        async loadCurrentPeriod() {
          const container = document.getElementById('highlight-card-container');
          container.innerHTML = '<div class="loading-spinner">Loading...</div>';

          let endpoint;
          let periodText;

          if (this.currentPeriodType === 'month') {
            const period = this.availablePeriods.months[this.currentMonthIndex];
            endpoint = `/highlights/month/${period.year}/${period.month}`;
            periodText = `${this.getMonthName(period.month)} ${period.year}`;
          } else {
            const year = this.availablePeriods.years[this.currentYearIndex];
            endpoint = `/highlights/year/${year}`;
            periodText = `${year}`;
          }

          document.getElementById('current-period').textContent = periodText;

          try {
            const response = await fetch(
              `http://localhost:3000${endpoint}`
            );
            const { data } = await response.json();

            this.renderCard(data, periodText);
          } catch (error) {
            console.error('Error loading highlights:', error);
            container.innerHTML = '<p class="error-message" style="color: #fff; text-align: center;">Failed to load highlights</p>';
          }
        }

        renderCard(data, periodText) {
          const container = document.getElementById('highlight-card-container');
          this.isFlipped = false;

          const playerData = data.playerOfTheMonth || data.playerOfTheYear;

          if (!playerData) {
            container.innerHTML = '<p class="error-message" style="color: #fff; text-align: center;">No player data available for this period</p>';
            return;
          }

          const card = document.createElement('div');
          card.className = 'fifa-card';
          card.innerHTML = `
            <div class="fifa-card-back">
              <div class="card-back-icon">🎁</div>
              <div class="card-back-text">Player of the ${this.currentPeriodType === 'month' ? 'Month' : 'Year'}</div>
              <div class="card-back-hint">Click to reveal</div>
            </div>

            <div class="fifa-card-front">
              <div class="player-card">
                <div class="card-header">
                  <div class="card-title">
                    🏆 Player of the ${this.currentPeriodType === 'month' ? 'Month' : 'Year'}
                  </div>
                  <div class="card-period">${periodText}</div>
                </div>

                <div class="card-player-info">
                  <img src="https://roundrobin.ch/IMAGES/Flags/GIF/128/${playerData.nationality}.gif"
                       class="player-flag"
                       alt="Flag"
                       onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/No_image_available.svg/300px-No_image_available.svg.png'" />
                  <div class="player-name">${playerData.name}</div>
                </div>

                <div class="card-stats">
                  ${this.renderStats(playerData.achievements)}
                </div>
              </div>
            </div>
          `;

          container.innerHTML = '';
          container.appendChild(card);

          // Add click to flip
          card.addEventListener('click', () => {
            if (!this.isFlipped) {
              card.classList.add('flipped');
              this.isFlipped = true;
            }
          });
        }

        renderStats(achievements) {
          if (!achievements || achievements.length === 0) {
            return '<p class="no-stats" style="color: #fff; text-align: center; padding: 20px;">No achievements this period</p>';
          }

          return achievements.map(achievement => `
            <div class="stat-item">
              <div class="stat-icon">${achievement.icon}</div>
              <div class="stat-content">
                <span class="stat-label">${achievement.stat}</span>
                <span class="stat-value">${achievement.value}</span>
              </div>
            </div>
          `).join('');
        }

        getMonthName(month) {
          const months = [
            'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
          ];
          return months[month - 1];
        }
      }

      // Initialize when highlights tab is shown
      function initHighlightsPage() {
        if (!highlightsPage) {
          highlightsPage = new HighlightsPage();
          highlightsPage.init();
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        // Apply the saved theme preference first
        const savedTheme = localStorage.getItem("theme");
        const iconSun = document.getElementById("icon-sun");
        const iconMoon = document.getElementById("icon-moon");

        // Add click handler for burger menu
        document
          .querySelector(".burger-menu")
          .addEventListener("click", toggleMenu);

        // Close menu when clicking outside
        document.addEventListener("click", function (event) {
          const menu = document.getElementById("burgerMenuContent");
          const burgerMenu = document.querySelector(".burger-menu");
          if (
            !burgerMenu.contains(event.target) &&
            !menu.contains(event.target)
          ) {
            menu.style.display = "none";
          }
        });

        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
          if (savedTheme === "dark") {
            iconMoon.style.display = "none";
            iconSun.style.display = "block";
          } else {
            iconSun.style.display = "none";
            iconMoon.style.display = "block";
          }
        }

        function setupAutoRefreshIfLiveScores() {
          const params = new URLSearchParams(window.location.search);
          const tab = params.get("tab");

          if (tab === "livescores") {
            setTimeout(() => {
              window.location.reload();
            }, 30000);
          }
        }

        handleTabSwitching();
        setupAutoRefreshIfLiveScores();

        // Add 3D breakoff animation to menu navigation
        document.querySelectorAll('.menu-item').forEach(link => {
          link.addEventListener('click', (e) => {
            // Only animate if going to a different tab
            const currentTab = new URLSearchParams(window.location.search).get('tab') || 'breaks';
            const targetUrl = new URL(link.href, window.location.origin);
            const targetTab = new URLSearchParams(targetUrl.search).get('tab') || 'breaks';

            if (currentTab !== targetTab) {
              e.preventDefault();
              // Navigate immediately without blocking on animation
              // This allows the new page to load while animation plays
              const targetUrl = link.href;

              // Mark that we're navigating (to prevent double animation)
              sessionStorage.setItem('isNavigating', 'true');

              // Start animation
              window.playBreakoffTransition();

              // Navigate after a short delay to allow animation to start
              setTimeout(() => {
                window.location.href = targetUrl;
              }, 100);
            }
          });
        });

        // Rest of the initialization code
        if (iconSun) {
          iconSun.addEventListener("click", function () {
            document.documentElement.setAttribute("data-theme", "light");
            localStorage.setItem("theme", "light"); // Save theme preference
            iconSun.style.display = "none";
            if (iconMoon) iconMoon.style.display = "block";
          });
        }

        if (iconMoon) {
          iconMoon.addEventListener("click", function () {
            document.documentElement.setAttribute("data-theme", "dark");
            localStorage.setItem("theme", "dark"); // Save theme preference
            iconMoon.style.display = "none";
            if (iconSun) iconSun.style.display = "block";
          });
        }

        document.addEventListener("click", async function (event) {
          if (event.target.matches(".expand-icon")) {
            const gridItem = event.target.closest(".grid-item");
            const tableNumber = gridItem.dataset.tableNumber;
            const matchId = gridItem.dataset.matchId;
            const matchStatus = gridItem.dataset.status;

            // Extract match data from grid item
            const matchData = {
              matchId: matchId,
              tableNumber: tableNumber,
              player1Name: gridItem.querySelector('.player-component:first-child .player-name')?.textContent || 'Unknown',
              player1IOC: gridItem.querySelector('.player-component:first-child .player-photo')?.src?.match(/\/([A-Z]{3})\.gif$/)?.[1] || 'XXX',
              player1Frames: parseInt(gridItem.querySelector('.frames-won.left')?.textContent) || 0,
              player2Name: gridItem.querySelector('.player-component:last-child .player-name')?.textContent || 'Unknown',
              player2IOC: gridItem.querySelector('.player-component:last-child .player-photo')?.src?.match(/\/([A-Z]{3})\.gif$/)?.[1] || 'XXX',
              player2Frames: parseInt(gridItem.querySelector('.frames-won.right')?.textContent) || 0,
              bestOf: parseInt(gridItem.querySelector('.best-of')?.textContent) || 0,
              active: matchStatus === 'active',
              ended: matchStatus === 'ended',
              player1Score: parseInt(gridItem.querySelector('.points.left')?.textContent) || 0,
              player2Score: parseInt(gridItem.querySelector('.points.right')?.textContent) || 0,
              player1Breaks: [],
              player2Breaks: []
            };

            // Extract breaks
            const breaksLeft = gridItem.querySelector('.breaks-list.left')?.textContent?.trim() || '';
            const breaksRight = gridItem.querySelector('.breaks-list.right')?.textContent?.trim() || '';
            matchData.player1Breaks = breaksLeft.split(',').map(b => parseInt(b.trim())).filter(b => !isNaN(b) && b > 0);
            matchData.player2Breaks = breaksRight.split(',').map(b => parseInt(b.trim())).filter(b => !isNaN(b) && b > 0);

            // Fetch frame actions if match exists

        function getBreakColor(breakValue) {
          // Check if this break is in the global top 3
          const breakIndex = globalTop3Breaks.indexOf(breakValue);
          if (breakIndex === 0) return 'break-gold';
          if (breakIndex === 1) return 'break-silver';
          if (breakIndex === 2) return 'break-bronze';

          // Default grey for all other breaks
          return 'break-grey';

        function createPlayerCard(player, index, playerRank = null) {
          const playerName = player.name || player.playerName;
          const breaksArray = Array.isArray(player.highbreaks)
            ? player.highbreaks
            : typeof player.highbreaks === 'string'
            ? player.highbreaks.split(',').map(b => parseInt(b.trim())).filter(b => b > 0)
            : [];

          const highestBreak = breaksArray.length > 0 ? Math.max(...breaksArray) : 0;
          const breakCount = breaksArray.length;
          const avgBreak = breaksArray.length > 0
            ? Math.round(breaksArray.reduce((a, b) => a + b, 0) / breaksArray.length)
            : 0;

          const card = document.createElement('div');
          card.className = 'player-break-card';
          card.style.animationDelay = `${index * 0.1}s`;

          card.innerHTML = `
            <div class="card-player-header">
              <img
                src="https://roundrobin.ch/IMAGES/Flags/GIF/128/${player.nationality || 'CH'}.gif"
                class="player-flag-card"
                alt="${player.nationality || 'CH'}"
                onerror="this.style.display='none'"
              />
              <a href="?tab=profile&name=${encodeURIComponent(playerName)}" class="player-name-card">
                ${playerName}
              </a>
            </div>

            <div class="card-stats-summary">
              <div class="stat-item-small">
                <span class="stat-label-small">High</span>
                <span class="stat-value-small">${highestBreak}</span>
              </div>
              <div class="stat-item-small">
                <span class="stat-label-small">Count</span>
                <span class="stat-value-small">${breakCount}</span>
              </div>
              <div class="stat-item-small">
                <span class="stat-label-small">Avg</span>
                <span class="stat-value-small">${avgBreak}</span>
              </div>
            </div>

            <div class="breaks-badges" id="breaks-${index}">
              <!-- Badges will be added here -->
            </div>
          `;

          // Add break badges after card is in DOM using innerHTML instead of appendChild
          setTimeout(() => {
            const badgesContainer = card.querySelector(`#breaks-${index}`);
            if (!badgesContainer) {
              console.error(`Badges container not found for index ${index}`);
              return;
            }

            const sortedBreaks = breaksArray.sort((a, b) => b - a);

            // Build HTML string for all badges at once
            const badgesHTML = sortedBreaks
              .map((breakValue, badgeIndex) => {
                const numValue = parseInt(breakValue);
                if (isNaN(numValue) || numValue < 0) return '';

                const colorClass = getBreakColor(numValue);
                const delay = badgeIndex * 0.05;
                return `<span class="break-badge ${colorClass}" style="animation-delay: ${delay}s">${numValue}</span>`;
              })
              .join('');

            // Set all badges at once
            badgesContainer.innerHTML = badgesHTML;
          }, 100 + (index * 100));

          return card;
        }

          }

          // Show chart when data exists
          if (chartContainer) {
            chartContainer.style.display = 'block';
          }

          // Collect all breaks from all players
          const allBreaks = [];
          data.forEach(player => {
            const breaksArray = Array.isArray(player.highbreaks)
              ? player.highbreaks
              : typeof player.highbreaks === 'string'
              ? player.highbreaks.split(',').map(b => parseInt(b.trim())).filter(b => b > 0)
              : [];
            allBreaks.push(...breaksArray);
          });

          // Sort all breaks in descending order and get top 3 unique values
          const uniqueBreaks = [...new Set(allBreaks)].sort((a, b) => b - a);
          globalTop3Breaks = uniqueBreaks.slice(0, 3);

          // Sort players by highest break for ranking
          const sortedData = [...data].sort((a, b) => {
            const breaksA = Array.isArray(a.highbreaks) ? a.highbreaks : a.highbreaks.split(',').map(b => parseInt(b.trim())).filter(b => b > 0);
            const breaksB = Array.isArray(b.highbreaks) ? b.highbreaks : b.highbreaks.split(',').map(b => parseInt(b.trim())).filter(b => b > 0);
            const maxA = breaksA.length > 0 ? Math.max(...breaksA) : 0;
            const maxB = breaksB.length > 0 ? Math.max(...breaksB) : 0;
            return maxB - maxA;
          });

          sortedData.forEach((player, index) => {
            const card = createPlayerCard(player, index, null);
            cardsGrid.appendChild(card);
          });
        }

        function handleTabSwitching() {
          const urlParams = new URLSearchParams(window.location.search);
          const tab = urlParams.get("tab");
          const table = urlParams.get("table");
          const name = urlParams.get("name");
          const pageTitleElement = document.getElementById("pageTitle");

          // Track page view in Google Analytics
          function trackPageView() {
            const queryString = window.location.search;
            const path = window.location.pathname;
            const url = path + queryString;
            gtag("config", "G-DPK8ZQTWBC", { page_path: url });
          }

          // Check if we should show animation (not on very first page load of session)
          const hasNavigatedBefore = sessionStorage.getItem('hasNavigated');
          const isNavigating = sessionStorage.getItem('isNavigating');

          // Don't animate if we just started navigating (animation already played)
          const shouldAnimate = hasNavigatedBefore === 'true' && isNavigating !== 'true';

          // Clear the navigation flag
          sessionStorage.removeItem('isNavigating');

          // Mark that we've navigated at least once
          sessionStorage.setItem('hasNavigated', 'true');

          // Function to execute tab switch logic
          function executeTabSwitch() {

          // Handling tab visibility
          if (tab === "livescores") {
            document.getElementById("breaksContent").classList.add("hidden");
            document
              .getElementById("liveScoresContent")
              .classList.remove("hidden");
            document
              .getElementById("playerProfileContent")
              ?.classList.add("hidden");
            pageTitleElement.textContent = "Live Scores";
            createScoreboardGrid();
            if (table) {
              openModalForTable(table);
            }
            trackPageView();
          } else if (tab === "profile" && name) {
            document.getElementById("breaksContent").classList.add("hidden");
            document
              .getElementById("liveScoresContent")
              .classList.add("hidden");
            document
              .getElementById("playerProfileContent")
              .classList.remove("hidden");
            pageTitleElement.textContent = "Player Profile";
            loadPlayerProfile(decodeURIComponent(name));
            trackPageView();
          } else if (tab === "matches" && name) {
            document.getElementById("breaksContent").classList.add("hidden");
            document
              .getElementById("liveScoresContent")
              .classList.add("hidden");
            document
              .getElementById("playerProfileContent")
              .classList.add("hidden");
            document
              .getElementById("matchHistoryContent")
              .classList.remove("hidden");
            pageTitleElement.textContent = "Match History";
            displayMatchHistory(decodeURIComponent(name));
          } else if (tab === "highlights") {
            document.getElementById("breaksContent").classList.add("hidden");
            document
              .getElementById("liveScoresContent")
              .classList.add("hidden");
            document
              .getElementById("playerProfileContent")
              ?.classList.add("hidden");
            document
              .getElementById("matchHistoryContent")
              ?.classList.add("hidden");
            document
              .getElementById("highlightsContent")
              .classList.remove("hidden");
            pageTitleElement.textContent = "Highlights";
            initHighlightsPage();
            trackPageView();
          } else {
            document.getElementById("breaksContent").classList.remove("hidden");
            document
              .getElementById("liveScoresContent")
              .classList.add("hidden");
            document
              .getElementById("playerProfileContent")
              ?.classList.add("hidden");
            pageTitleElement.textContent = "Daily Breaks";
            trackPageView();
          }
          }

          // Execute tab switch with or without animation
          console.log('shouldAnimate:', shouldAnimate);
          if (shouldAnimate) {
            // Use 3D breakoff transition - load data DURING animation
            console.log('Playing 3D break-off animation');

            // Start loading data immediately (runs in parallel with animation)
            executeTabSwitch();

            // Play animation (data loads while animation plays)
            window.playBreakoffTransition();
          } else {
            // No animation on very first page load
            console.log('Skipping animation on first load');
            executeTabSwitch();
          }
        }

          console.log(`expanding table ${tableNumber}`); // Debugging
          // Simulate clicking on the expand icon for the given table number
          const expandIcon = document.querySelector(

          let nameParts = fullName.split(" ");

        function formatName(fullName) {
          if (!fullName) return "Player";
          let deviceWidth =
            window.innerWidth > 0 ? window.innerWidth : screen.width;
          let nameLength = fullName.length;
          if (deviceWidth > 1900) {
            return concatName(fullName, 15);
          } else if (deviceWidth <= 1900 && deviceWidth > 1600) {
            return concatName(fullName, 8);
          } else if (deviceWidth <= 1600 && deviceWidth > 1500) {
            return concatName(fullName, 6);
          } else if (deviceWidth <= 1500 && deviceWidth > 1200) {
            return concatName(fullName, 4);
          } else if (deviceWidth <= 1200 && deviceWidth > 1150) {
            return concatName(fullName, 3);
          } else if (deviceWidth <= 1150 && deviceWidth > 1024) {
            return concatName(fullName, 2);
          } else if (deviceWidth <= 1024 && deviceWidth > 896) {
            return concatName(fullName, 7);
          } else if (deviceWidth <= 896 && deviceWidth > 820) {
            return concatName(fullName, 6);
          } else if (deviceWidth <= 820 && deviceWidth > 768) {
            return concatName(fullName, 5);
          } else if (deviceWidth <= 768 && deviceWidth > 650) {
            return concatName(fullName, 10);
          } else if (deviceWidth <= 650 && deviceWidth > 550) {
            return concatName(fullName, 8);
          } else if (deviceWidth <= 550 && deviceWidth > 450) {
            return concatName(fullName, 6);
          } else if (deviceWidth <= 450 && deviceWidth > 400) {

        function formatDate(date) {
          const now = new Date();
          const matchDate = new Date(date);
          const twentyFourHoursAgo = new Date(
            now.getTime() - 24 * 60 * 60 * 1000
          );

          let dateString;

          if (matchDate < twentyFourHoursAgo) {
            dateString =
              matchDate.toISOString().slice(8, 10) +
              "/" +
              matchDate.toISOString().slice(5, 7) +
              "/" +
              matchDate.toISOString().slice(2, 4);
          } else {
            // Format time for recent dates
            let hours = matchDate.getHours();
            let minutes = matchDate.getMinutes();
            // Pad single digit minutes with leading zero
            minutes = minutes < 10 ? `0${minutes}` : minutes;
            // Convert "24" to "00"
            hours = hours === 0 ? "00" : hours < 10 ? `0${hours}` : hours;
            dateString = `${hours}:${minutes}`;
          }

          return dateString;
        }

        function animateStatCounters() {
          const statValues = document.querySelectorAll('.stat-value[data-target]');

          statValues.forEach(stat => {
            const target = parseInt(stat.getAttribute('data-target'));
            const suffix = stat.getAttribute('data-suffix') || '';
            const duration = 2000;
            const startTime = performance.now();

            function updateCounter(currentTime) {
              const elapsed = currentTime - startTime;
              const progress = Math.min(elapsed / duration, 1);

              // Ease out cubic
              const easeProgress = 1 - Math.pow(1 - progress, 3);
              const current = Math.floor(easeProgress * target);

              stat.textContent = current + suffix;

              if (progress < 1) {
                requestAnimationFrame(updateCounter);
              } else {
                stat.textContent = target + suffix;
              }
            }

            requestAnimationFrame(updateCounter);
          });
        }

                      <td>${new Date(match.date).toLocaleDateString()}</td>
                      <td>${match.tableNumber || "-"}</td>
                      <td class="${isPlayer1 ? "current-player" : ""}">
                        ${
                          isPlayer1
                            ? match.player1Name
                            : `<a href="?tab=profile&name=${encodeURIComponent(
                                match.player1Name
                              )}">${match.player1Name}</a>`
                        }
                      </td>
                      <td class="${!isPlayer1 ? "current-player" : ""}">
                        ${
                          !isPlayer1
                            ? match.player2Name
                            : `<a href="?tab=profile&name=${encodeURIComponent(
                                match.player2Name
                              )}">${match.player2Name}</a>`
                        }
                      </td>
                      <td>Best of ${match.bestOf}</td>
                      <td>${match.framesPlayer1}-${match.framesPlayer2}</td>
                      <td class="${
                        result === "Won"
                          ? "win"
                          : result === "Lost"
                          ? "loss"
                          : "dnf"
                      }">${result}</td>
                      <td>${formatBreaks(breaks1)}</td>
                      <td>${formatBreaks(breaks2)}</td>
                    </tr>`;
                  } catch (e) {
                    console.error("Error processing match:", e);
                    return "";
                  }
                })
                .join("");

              // Attach click handlers to match rows for breakdown modal
              tbody.querySelectorAll('.match-row-clickable').forEach(row => {
                row.addEventListener('click', async (e) => {
                  // Don't trigger if clicking a link
                  if (e.target.tagName === 'A') return;
                  const matchId = row.dataset.matchId;
                  const matchData = {
                    matchId: matchId,
                    tableNumber: row.dataset.table || '-',
                    player1Name: row.dataset.p1Name,
                    player2Name: row.dataset.p2Name,
                    player1IOC: row.dataset.p1Ioc,
                    player2IOC: row.dataset.p2Ioc,
                    player1Frames: parseInt(row.dataset.p1Frames) || 0,
                    player2Frames: parseInt(row.dataset.p2Frames) || 0,
                    bestOf: parseInt(row.dataset.bestOf) || 0,
                    active: false,
                    ended: !!row.dataset.winner,
                    player1Score: 0,
                    player2Score: 0,
                    player1Breaks: JSON.parse(decodeURIComponent(row.dataset.breaks1 || '[]')),
                    player2Breaks: JSON.parse(decodeURIComponent(row.dataset.breaks2 || '[]')),
                  };
                  let frameActions = [];
                  if (matchId) {
                    try {
                      const res = await fetch(`http://localhost:3000/api/frame-actions/${matchId}`);
                      const json = await res.json();
                      frameActions = json.data || [];
                    } catch (err) {
                      console.error('Error fetching frame actions:', err);
                    }
                  }
                  openMatchDetailsModal(matchData, frameActions);
                });
              });

              // Populate opponent selector if it's empty
              if (opponentSelect && opponentSelect.options.length <= 1) {
                try {
                  const playersResponse = await fetch(
                    "http://localhost:3000/players"
                  );
                  const { data: players } = await playersResponse.json();

                  // Sort players alphabetically
                  const sortedPlayers = players.sort((a, b) =>
                    a.localeCompare(b)
                  );

                  // Add options to select
                  opponentSelect.innerHTML =
                    '<option value="">All Opponents</option>' +
                    sortedPlayers
                      .map(
                        (player) =>
                          `<option value="${player}">${player}</option>`
                      )
                      .join("");
                } catch (e) {
                  console.warn("Failed to load opponents list:", e);
                }
              }
            } catch (error) {
              console.error("Error loading matches:", error);
              container.innerHTML = `<p>Error loading match history: ${error.message}</p>`;
            }
          }

          // Initial load
          loadMatches();

          // Handle opponent filter changes
          opponentSelect.addEventListener("change", () => {
            loadMatches(1, opponentSelect.value);
          });
        }
      });
    </script>
    <div id="videoModal" class="video-modal">
      <div class="video-container">
        <iframe
          src="https://player.twitch.tv/?channel=dlf147&parent=stats.roundrobin.ch&autoplay=true"
          height="600"
          width="800"
          allowfullscreen
        >
        </iframe>
      </div>
    </div>

    <!-- Match Details Modal -->
    <div id="matchDetailsModal" class="match-modal">
      <div class="match-modal-content">
        <div class="match-modal-header">
          <h2 class="match-modal-title">Match Details</h2>
          <button class="match-modal-close" id="closeMatchModal">✕</button>
        </div>
        <div class="match-modal-body" id="matchModalBody">
          <!-- Content will be dynamically inserted here -->
        </div>
      </div>
    </div>

    <!-- 3D Snooker Break-Off Transition Overlay -->
    <div id="breakoff-transition-overlay" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      background: var(--bg-gradient-dark);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    ">
      <iframe
        id="breakoff-transition-iframe"
        src=""
        style="
          width: 100%;
          height: 100%;
          border: none;
          background: transparent;
        "
        loading="eager"
      ></iframe>
    </div>

    <script>
      // 3D Break-Off Page Transition
      (function() {
        const overlay = document.getElementById('breakoff-transition-overlay');
        const iframe = document.getElementById('breakoff-transition-iframe');

        function playBreakoffTransition(callback) {
          // Load the short animation (2s duration, no controls, no loading modal)
          // Add cache-busting parameter to ensure fresh load
          iframe.src = 'breakoff-3d-short.html?v=' + Date.now();

          // Fade in immediately
          overlay.style.opacity = '1';
          overlay.style.pointerEvents = 'auto';

          // Fade out after 2 seconds
          setTimeout(() => {
            overlay.style.opacity = '0';
            setTimeout(() => {
              overlay.style.pointerEvents = 'none';
              iframe.src = ''; // Unload to free resources
              if (callback) callback();
            }, 500);
          }, 2000);
        }

        // Expose to window for manual trigger
        window.playBreakoffTransition = playBreakoffTransition;
      })();
    </script>
  </body>
</html>
