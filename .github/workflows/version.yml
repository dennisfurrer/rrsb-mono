name: Version bump

# After every push to main, bump the patch version of each app/package whose
# files changed, and commit the bumps back. The push-back uses the default
# GITHUB_TOKEN (which does NOT trigger another workflow run) plus a [skip ci]
# guard, so this never loops.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump versions for changed packages
        run: node scripts/bump-versions.mjs
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}

      - name: Commit & push version bumps
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: bump app versions [skip ci]"
            git push
          else
            echo "No version changes to commit."
          fi
