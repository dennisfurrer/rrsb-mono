name: Deploy scoreboard

# Runs AFTER the "Version bump" workflow finishes on main, so it always ships the
# freshly version-bumped build. Cloudflare Pages, direct upload (GitHub builds it;
# Cloudflare does not). For now this deploys the scoreboard UI only.

on:
  workflow_run:
    workflows: ["Version bump"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    # Only for successful Version-bump runs on main.
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Gate on Cloudflare secret
        id: gate
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "CLOUDFLARE_API_TOKEN not set yet — skipping deploy (set the secret to enable)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          ref: main # latest main — includes the version-bump commit

      - if: steps.gate.outputs.ready == 'true'
        uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - if: steps.gate.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.gate.outputs.ready == 'true'
        run: pnpm --filter @rrsb/scoreboard-ui build

      - name: Deploy to Cloudflare Pages
        if: steps.gate.outputs.ready == 'true'
        working-directory: apps/scoreboard-ui
        run: |
          npx wrangler@4 pages project create rrsb-scoreboard --production-branch=main 2>/dev/null || echo "project already exists"
          npx wrangler@4 pages deploy --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
